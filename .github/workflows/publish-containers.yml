name: Publish containers

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mohammad-mokdad-mm/mekdadcirculargraph

jobs:
  docker:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set image reference
        id: image
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="${GITHUB_REF_NAME#v}"
          elif [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            tag="edge"
          elif [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            tag="pr-${{ github.event.number }}"
          else
            tag="sha-${GITHUB_SHA}"
          fi
          echo "image=${REGISTRY}/${IMAGE_NAME}:${tag}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=sha-${{ github.sha }},enable=${{ github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=pr

      - name: Build and optionally publish image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start interactive Docker container
        run: |
          docker run --detach --name circular-graph-smoke \
            --publish 127.0.0.1:8000:8000 \
            "${{ steps.image.outputs.image }}"

      - name: Smoke-test Docker web interface
        run: |
          for _ in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:8000/ >/dev/null; then
              break
            fi
            sleep 1
          done
          curl --fail --silent --show-error http://127.0.0.1:8000/1 >/dev/null
          curl --fail --silent --show-error http://127.0.0.1:8000/js/mpl.js >/dev/null
          docker exec circular-graph-smoke python -c \
            "from tornado.ioloop import IOLoop; from tornado.websocket import websocket_connect; connection = IOLoop.current().run_sync(lambda: websocket_connect('ws://127.0.0.1:8000/1/ws')); connection.close()"

      - name: Stop interactive Docker container
        if: always()
        run: docker rm --force circular-graph-smoke || true

      - name: Generate image attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  apptainer:
    name: Build and publish Apptainer SIF
    if: github.event_name != 'pull_request'
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Apptainer
        run: |
          sudo apt-get update
          sudo apt-get install --yes software-properties-common
          sudo add-apt-repository --yes ppa:apptainer/ppa
          sudo apt-get update
          sudo apt-get install --yes apptainer

      - name: Build SIF from the Apptainer definition
        run: sudo apptainer build mekdad-circular-graph.sif Apptainer.def

      - name: Smoke-test SIF
        run: |
          mkdir -p output
          apptainer run --cleanenv \
            --bind "$PWD/output:/output" \
            mekdad-circular-graph.sif \
            --output /output/smoke-test.png --dpi 72
          test -s output/smoke-test.png

      - name: Smoke-test SIF web interface
        run: |
          apptainer run --cleanenv mekdad-circular-graph.sif >webagg.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for _ in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:8000/ >/dev/null; then
              break
            fi
            sleep 1
          done
          curl --fail --silent --show-error http://127.0.0.1:8000/1 >/dev/null
          curl --fail --silent --show-error http://127.0.0.1:8000/js/mpl.js >/dev/null
          apptainer exec --cleanenv mekdad-circular-graph.sif \
            /opt/venv/bin/python -c \
            "from tornado.ioloop import IOLoop; from tornado.websocket import websocket_connect; connection = IOLoop.current().run_sync(lambda: websocket_connect('ws://127.0.0.1:8000/1/ws')); connection.close()"
          kill "$server_pid" 2>/dev/null || true
          wait "$server_pid" 2>/dev/null || true
          trap - EXIT

      - name: Create SIF checksum
        run: sha256sum mekdad-circular-graph.sif > mekdad-circular-graph.sif.sha256

      - name: Upload SIF workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: mekdad-circular-graph-sif-${{ github.ref_name }}
          path: |
            mekdad-circular-graph.sif
            mekdad-circular-graph.sif.sha256
          if-no-files-found: error

      - name: Publish SIF in GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              mekdad-circular-graph.sif \
              mekdad-circular-graph.sif.sha256 \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              mekdad-circular-graph.sif \
              mekdad-circular-graph.sif.sha256 \
              --generate-notes --verify-tag
          fi
